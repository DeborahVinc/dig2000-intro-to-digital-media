<!DOCTYPE html>
<html lang = "en">
    <head>
        <meta charset = "UTF-8">
        <title>Project Week 6</title>
        <style>
            canvas{
                border: 1px solid black;
                display: block;
                margin: 20px auto;
            }
        </style>
    </head>

    <body>
        <canvas id="canvas" width="500" height="400"></canvas>

        <script>
            const canvas = document.getElementById("canvas");
            const tools = canvas.getContext("2d");

            const rX = Math.floor(Math.random() * 400);
            const rY = Math.floor(Math.random() * 200);

            const img = new Image();
            img.src = "media_1eeac4f414fef7a2538f45d131ecae95e859923d9 (1).png";
            img.onload = () => {
                tools.drawImage(img, 20, 20, 60, 60);
            };

            const randColor = `rgb(${Math.random()*255}, ${Math.random()*255}, ${Math.random()*255})`;
            tools.fillStyle = randColor;
            tools.fillRect(100, 330, 300, 50);

            tools.beginPath();
            tools.moveTo(120, 30);
            tools.lineTo(250, 40);
            tools.lineTo(150, 60);
            tools.closePath();
            tools.stroke();

            tools.beginPath();
            tools.arc(300, 40, 30, 0, Math.PI);
            tools.stroke();

            tools.beginPath();
            tools.arc(400, 50, 35, 0, 2 * Math.PI);
            tools.fill();

            tools.beginPath();
            tools.moveTo(90, 250);
            tools.bezierCurveTo(150, 90, 150, 250, 200, 170);
            tools.stroke();

            tools.beginPath();
            tools.moveTo(250, 250);
            tools.quadraticCurveTo(250, 100, 300, 200);
            tools.stroke();

            tools.font = "16px Arial";
            tools.fillText("Go Knights", 350, 200);

            canvas.addEventListener("click", () => {
                alert("Canvas clicked!");
            });
        </script>
    </body>
</html>
